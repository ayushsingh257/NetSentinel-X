
services:

  postgres:
    image: postgres:17
    container_name: netsentinel-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sandy
      POSTGRES_DB: netsentinelx

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: netsentinel-backend

    env_file:
      - ./backend/.env

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    restart: always

  frontend:
    build: ./frontend
    container_name: netsentinel-frontend

    depends_on:
      - backend

    ports:
      - "3000:3000"

    restart: always

volumes:
  postgres_data: